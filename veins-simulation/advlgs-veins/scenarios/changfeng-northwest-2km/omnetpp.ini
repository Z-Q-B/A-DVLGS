*.node[*].appl.cryptoScheme = "BBS"
*.rsu[*].appl.cryptoScheme = "BBS"
*.node[*].appl.fixedSignDelay = 0.010505589s
*.node[*].appl.fixedVerifyDelay = 0.015034069s
*.rsu[*].appl.fixedVerifyDelay = 0.015034069s


[Config CLGSBase]
