[General]
cmdenv-express-mode = true
cmdenv-autoflush = true
cmdenv-status-frequency = 1s
**.cmdenv-log-level = info
repeat = 5

network = RSUExampleScenario

[Config ChangfengBase]
description = "A-DVLGS simulation on the Shanghai Changfeng northwest 2.0x2.0 km map"

sim-time-limit = 100s
seed-set = ${runnumber}

**.scalar-recording = true
**.vector-recording = true
output-scalar-file = results/${configname}-${runnumber}.sca
output-vector-file = results/${configname}-${runnumber}.vec

*.playgroundSizeX = 2300m
*.playgroundSizeY = 2300m
*.playgroundSizeZ = 50m

*.annotations.draw = true

*.manager.updateInterval = 0.1s
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = true
*.manager.trafficLightModuleType = ""

*.rsu[0].mobility.x = 350
*.rsu[0].mobility.y = 350
*.rsu[1].mobility.x = 850
*.rsu[1].mobility.y = 350
*.rsu[2].mobility.x = 1350
*.rsu[2].mobility.y = 350
*.rsu[3].mobility.x = 1850
*.rsu[3].mobility.y = 350
*.rsu[4].mobility.x = 350
*.rsu[4].mobility.y = 850
*.rsu[5].mobility.x = 850
*.rsu[5].mobility.y = 850
*.rsu[6].mobility.x = 1350
*.rsu[6].mobility.y = 850
*.rsu[7].mobility.x = 1850
*.rsu[7].mobility.y = 850
*.rsu[8].mobility.x = 350
*.rsu[8].mobility.y = 1350
*.rsu[9].mobility.x = 850
*.rsu[9].mobility.y = 1350
*.rsu[10].mobility.x = 1350
*.rsu[10].mobility.y = 1350
*.rsu[11].mobility.x = 1850
*.rsu[11].mobility.y = 1350
*.rsu[12].mobility.x = 350
*.rsu[12].mobility.y = 1850
*.rsu[13].mobility.x = 850
*.rsu[13].mobility.y = 1850
*.rsu[14].mobility.x = 1350
*.rsu[14].mobility.y = 1850
*.rsu[15].mobility.x = 1850
*.rsu[15].mobility.y = 1850
*.rsu[*].mobility.z = 3
*.rsu[*].applType = "org.advlgs.CryptoRSU11p"
*.rsu[*].appl.serviceDomain = "SPS:changfeng-northwest"
*.rsu[*].appl.repeatMessages = false
*.rsu[*].appl.headerLength = 80 bit
*.rsu[*].appl.dataLengthBits = 1024 bit
*.rsu[*].appl.signedMessageBytes = 128B
*.rsu[*].appl.serviceRequestTtl = 1s
*.rsu[*].appl.enableBatchVerification = true
*.rsu[*].appl.batchMaxSize = 0  # unlimited inside each 20 ms arrival window
*.rsu[*].appl.batchWindow = 0.02s
*.rsu[*].appl.useFixedCryptoTiming = true
*.rsu[*].appl.skipCryptoComputation = true
*.rsu[*].appl.sendBeacons = false
*.rsu[*].appl.dataOnSch = false
*.rsu[*].appl.beaconInterval = 1s
*.rsu[*].appl.beaconUserPriority = 7
*.rsu[*].appl.dataUserPriority = 5
*.rsu[*].nic.phy80211p.antennaOffsetZ = 0 m

*.connectionManager.sendDirect = true
*.connectionManager.maxInterfDist = 300m
*.connectionManager.drawMaxIntfDist = false
*.**.nic.mac1609_4.useServiceChannel = false
*.**.nic.mac1609_4.txPower = 20mW
*.**.nic.mac1609_4.bitrate = 6Mbps
*.**.nic.phy80211p.minPowerLevel = -110dBm
*.**.nic.phy80211p.useNoiseFloor = true
*.**.nic.phy80211p.noiseFloor = -98dBm
*.**.nic.phy80211p.decider = xmldoc("config.xml")
*.**.nic.phy80211p.analogueModels = xmldoc("config.xml")
*.**.nic.phy80211p.usePropagationDelay = true
*.**.nic.phy80211p.antenna = xmldoc("antenna.xml", "/root/Antenna[@id='monopole']")
*.node[*].nic.phy80211p.antennaOffsetY = 0 m
*.node[*].nic.phy80211p.antennaOffsetZ = 1.895 m

*.node[*].applType = "org.advlgs.CryptoDemo11p"
*.node[*].appl.serviceDomain = "SPS:changfeng-northwest"
*.node[*].appl.experimentMode = true
*.node[*].appl.announcementProbability = 1.0
*.node[*].appl.announcementInterval = 0.3s
*.node[*].appl.announcementStopTime = 99.5s
*.node[*].appl.fixedMessageBytes = 0B
*.node[*].appl.headerLength = 80 bit
*.node[*].appl.dataLengthBits = 1024 bit
*.node[*].appl.signedMessageBytes = 128B
*.node[*].appl.useFixedCryptoTiming = true
*.node[*].appl.skipCryptoComputation = true
*.node[*].appl.sendBeacons = false
*.node[*].appl.dataOnSch = false
*.node[*].appl.beaconInterval = 1s

*.node[*].veinsmobility.x = 0
*.node[*].veinsmobility.y = 0
*.node[*].veinsmobility.z = 0
*.node[*].veinsmobility.setHostSpeed = false


[Config ADVLGSBase]
extends = ChangfengBase
*.node[*].appl.cryptoScheme = "A-DVLGS"
*.rsu[*].appl.cryptoScheme = "A-DVLGS"
*.node[*].appl.fixedSignDelay = 0.009354059s
*.node[*].appl.fixedVerifyDelay = 0.012962006s
*.rsu[*].appl.fixedVerifyDelay = 0.012962006s

*.rsu[*].appl.fixedBatchVerifyDelayPerItem = 0s
*.rsu[*].appl.fixedBatchVerifyDelayBySize = "2:22.027156ms,3:29.600752ms,4:37.354594ms,5:45.163510ms,6:52.978918ms,7:60.440226ms,8:67.939923ms,9:77.860591ms,10:83.794047ms,11:94.519844ms,12:99.176086ms,13:106.781596ms,14:114.415620ms,15:126.985832ms,16:129.987362ms"


